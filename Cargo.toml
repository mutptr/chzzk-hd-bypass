[package]
name = "chzzk"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.101"
axum = "0.8.8"
axum-extra = { version = "0.12.5", features = ["typed-header"] }
http = "1.4.0"
regex = "1.12.3"
reqwest = { version = "0.13.2", features = ["gzip", "brotli", "zstd", "deflate"] }
tokio = { version = "1.49.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "chrono"] }
